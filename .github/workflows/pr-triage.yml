name: PR Triage

on:
  pull_request_target:
    types:
      - opened

permissions:
  pull-requests: write
  issues: read

jobs:
  triage:
    name: Triage PR
    runs-on: ubuntu-latest
    steps:
      - name: Label first-time contributors
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Check if this is the author's first PR to this repo
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:pr author:${author}`,
              per_page: 1,
            });
            if (searchResult.total_count <= 1) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['first-time-contributor'],
              });
            }

      - name: Check for missing issue link
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip this check for org members and collaborators
            const association = pr.author_association;
            if (['MEMBER', 'OWNER', 'COLLABORATOR'].includes(association)) {
              console.log(`Skipping missing-issue-link check for ${association} (${pr.user.login}).`);
              return;
            }

            const body = (pr.body || '').toLowerCase();

            const hasIssueRef = /(?:fixes|closes|resolves|fix|close|resolve)\s+#\d+/.test(body)
              || /#\d+/.test(body)
              || /github\.com\/agno-agi\/agno\/issues\/\d+/.test(body);

            if (!hasIssueRef) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['missing-issue-link'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: 'This PR does not reference an issue. Please link the issue it addresses using `fixes #<issue_number>`, `closes #<issue_number>`, or `resolves #<issue_number>` in the PR description. If there is no existing issue, please create one first.',
              });
            }

      - name: Check for missing tests
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Get the list of changed files (paginate to cover large PRs)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedFiles = files.map(f => f.filename);
            const touchesSource = changedFiles.some(f =>
              f.startsWith('libs/agno/agno/') && f.endsWith('.py')
            );
            const touchesTests = changedFiles.some(f =>
              f.includes('/tests/') && f.endsWith('.py')
            );

            // Only flag missing tests when source code is changed but no test files are touched
            if (touchesSource && !touchesTests) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['missing-tests'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: 'This PR modifies source code but does not include any test changes. Please add or update tests to cover your changes.',
              });
            }

      - name: Detect duplicate PRs for the same issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '');

            // Extract issue numbers referenced in the PR body
            const issueRefs = new Set();
            const patterns = [
              /(?:fixes|closes|resolves|fix|close|resolve)\s+#(\d+)/gi,
              /github\.com\/agno-agi\/agno\/issues\/(\d+)/gi,
            ];

            for (const pattern of patterns) {
              let match;
              while ((match = pattern.exec(body)) !== null) {
                issueRefs.add(parseInt(match[1], 10));
              }
            }

            if (issueRefs.size === 0) {
              console.log('No issue references found, skipping duplicate check.');
              return;
            }

            // For each referenced issue, search for other open PRs that reference the same issue
            const duplicates = [];

            for (const issueNumber of issueRefs) {
              const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open ${issueNumber} in:body`,
                per_page: 10,
              });

              for (const item of searchResult.items) {
                if (item.number !== pr.number && item.pull_request) {
                  duplicates.push({ issue: issueNumber, pr: item.number });
                }
              }
            }

            if (duplicates.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['possible-duplicate'],
              });

              const prLinks = duplicates.map(d => `- #${d.pr} (also references issue #${d.issue})`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `**Possible duplicate detected.** The following open PRs also reference the same issue(s):\n\n${prLinks}\n\nIf this is intentional, please explain in your PR description why this approach is preferred. Otherwise, consider collaborating on the existing PR instead.`,
              });
            }

      - name: Check if linked issue is assigned to someone else
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '');
            const prAuthor = pr.user.login;

            // Extract issue numbers referenced in the PR body
            const issueRefs = new Set();
            const patterns = [
              /(?:fixes|closes|resolves|fix|close|resolve)\s+#(\d+)/gi,
              /github\.com\/agno-agi\/agno\/issues\/(\d+)/gi,
            ];

            for (const pattern of patterns) {
              let match;
              while ((match = pattern.exec(body)) !== null) {
                issueRefs.add(parseInt(match[1], 10));
              }
            }

            if (issueRefs.size === 0) {
              console.log('No issue references found, skipping assignment check.');
              return;
            }

            const conflicts = [];

            for (const issueNumber of issueRefs) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });

                if (issue.assignees && issue.assignees.length > 0) {
                  const assignedToAuthor = issue.assignees.some(a => a.login === prAuthor);
                  if (!assignedToAuthor) {
                    const assignees = issue.assignees.map(a => `@${a.login}`).join(', ');
                    conflicts.push({ issue: issueNumber, assignees });
                  }
                }
              } catch (err) {
                console.log(`Could not fetch issue #${issueNumber}: ${err.message}`);
              }
            }

            if (conflicts.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['issue-assigned-to-other'],
              });

              const details = conflicts.map(c => `- Issue #${c.issue} is assigned to ${c.assignees}`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `**Heads up:** This PR references an issue that is already assigned to someone else.\n\n${details}\n\nPlease confirm with the assignee or a maintainer in the issue comments before proceeding. PRs for assigned issues without prior coordination may be closed.`,
              });
            }

      - name: Detect low-context PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').trim();

            // Flag PRs with very short or empty descriptions
            const strippedBody = body
              .replace(/## Summary/g, '')
              .replace(/## Type of change/g, '')
              .replace(/## Checklist/g, '')
              .replace(/## Additional Notes/g, '')
              .replace(/### Duplicate and AI-Generated PR Check/g, '')
              .replace(/- \[ \] .*/g, '')
              .replace(/- \[x\] .*/g, '')
              .replace(/---/g, '')
              .replace(/\(If applicable.*\)/g, '')
              .replace(/Add any important context.*/g, '')
              .replace(/Describe key changes.*/g, '')
              .trim();

            if (strippedBody.length < 30) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-description'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: 'This PR has little or no description beyond the template defaults. Please fill in the Summary section explaining what this PR does and why. PRs without adequate context may be closed without review.',
              });
            }
